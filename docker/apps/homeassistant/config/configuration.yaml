
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# Reverse Proxy Configuration
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.18.0.0/16     # Docker 내부 네트워크 (Nginx 연동용)
    - 127.0.0.1         # 로컬 호스트 (IPv4)
    - ::1               # 로컬 호스트 (IPv6)
    # Cloudflare IPv4 Ranges (외부 접속용)
    - 103.21.244.0/22
    - 103.22.200.0/22
    - 103.31.4.0/22
    - 104.16.0.0/13
    - 104.24.0.0/14
    - 108.162.192.0/18
    - 131.0.72.0/22
    - 141.101.64.0/18
    - 162.158.0.0/15
    - 172.64.0.0/13
    - 173.245.48.0/20
    - 188.114.96.0/20
    - 190.93.240.0/20
    - 197.234.240.0/22
    - 198.41.128.0/17

