server {
    listen 443 ssl;
    http2 on;
    server_name adg.deepblue.im;

    include /etc/nginx/conf.d/common/ssl_params.conf;

    # 네트워크 3대 원칙: 내부인($is_internal=1)이 아니면 차단
    if ($is_internal = 0) {
        return 403;
    }

    location / {
        proxy_pass http://adguard:13080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AdGuard Home 관리 UI를 위한 추가 설정
        proxy_redirect off;
        proxy_buffering off;
    }
}
