server {
    listen 443 ssl;
    http2 on;
    server_name adguard.deepblue.im;

    include /etc/nginx/conf.d/common/ssl_params.conf;

    # 내부망(Private Network)에서만 접속 허용
    allow 192.168.0.0/16;
    allow 172.16.0.0/12;
    allow 10.0.0.0/8;
    allow 127.0.0.1;
    # 그 외 모든 외부 접속 차단
    deny all;

    location / {
        proxy_pass http://adguard:13080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AdGuard Home 관리 UI를 위한 추가 설정
        proxy_redirect off;
        proxy_buffering off;
    }
}
