# ==========================================================
# n8n 서비스 (https://n8n.deepblue.im)
# ==========================================================
server {
    listen 443 ssl;
    server_name n8n.deepblue.im;

    ssl_certificate     /etc/nginx/certs/live/deepblue.im/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/deepblue.im/privkey.pem;

    location / {
        # 내부망 IP 대역만 허용
        allow 192.168.219.0/24;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny all;

        # n8n proxy 설정
        proxy_pass http://n8n:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 지원 (n8n 워크플로우 실시간 반영 필수)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}
