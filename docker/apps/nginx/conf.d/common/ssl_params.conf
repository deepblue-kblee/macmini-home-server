# SSL Certificate
ssl_certificate     /etc/nginx/certs/live/deepblue.im/fullchain.pem;
ssl_certificate_key /etc/nginx/certs/live/deepblue.im/privkey.pem;

# SSL Protocols & Ciphers
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers on;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

# SSL Session Cache
ssl_session_timeout 1d;
ssl_session_cache shared:SSL:10m;
ssl_session_tickets off;

# HSTS (Optional, but recommended for security)
add_header Strict-Transport-Security "max-age=63072000" always;

# Security Headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-XSS-Protection "1; mode=block" always;
# Content-Security-Policy (CSP)는 서비스별 특성이 강하므로 여기서는 생략하거나 기본값만 설정 가능합니다.

# OCSP Stapling
ssl_stapling on;
ssl_stapling_verify on;
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

# Real IP configuration (Cloudflare & Local)
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

