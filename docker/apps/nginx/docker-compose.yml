services:
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    platform: linux/arm64
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Certbot이 발급한 Let's Encrypt 인증서 경로 매핑
      - ./letsencrypt:/etc/nginx/certs:ro
      - ./html:/usr/share/nginx/html:ro
      - ./logs:/var/log/nginx
    networks:
      - web
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 인증서 발급 및 갱신을 담당하는 서비스 (3개월마다 자동 갱신을 위해 유지)
  certbot:
    image: certbot/dns-cloudflare:latest
    container_name: certbot
    platform: linux/arm64
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - /Users/deepblue/.config/credentials/cloudflare/cloudflare.ini:/root/.secrets/cloudflare.ini:ro
    # 인증서 자동 갱신을 위한 커맨드 (주기적 실행)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12d & wait $${!}; done;'"

# Cloudflare Edge Certificates (Let's Encrypt)와 체계를 맞추기 위해 Certbot을 사용합니다.

networks:
  web:
    name: web
    driver: bridge
