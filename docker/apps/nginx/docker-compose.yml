services:
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    # Apple Silicon 호환성 명시
    platform: linux/arm64
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Certbot이 발급한 인증서 경로를 직접 매핑
      - ./letsencrypt:/etc/nginx/certs:ro
      - ./html:/usr/share/nginx/html:ro
      - ./logs:/var/log/nginx
      # [삭제 가능] Let's Encrypt를 사용하면 호스트의 특정 자격증명 폴더를 직접 매핑할 필요가 없어짐 
      # - ${HOME}/.config/credentials/cloudflare:${HOME}/.config/credentials/cloudflare # for symbolic link
    networks:
      - web

  # 인증서 발급 및 갱신을 담당하는 서비스
  certbot:
    image: certbot/dns-cloudflare:latest
    container_name: certbot
    platform: linux/arm64
    network_mode: host
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - ${HOME}/.config/credentials/cloudflare/cloudflare.ini:/root/.secrets/cloudflare.ini:ro
    # 최초 실행 시 인증서 발급용 command (발급 후에는 주석 처리하거나 필요시 실행)
    command: >
      certonly --dns-cloudflare
      --dns-cloudflare-credentials /root/.secrets/cloudflare.ini
      --dns-cloudflare-propagation-seconds 120
      -d "deepblue.im"
      -d "*.deepblue.im"
      --email deepblue.kblee@gmail.com
      --agree-tos
      --no-eff-email
      --non-interactive

networks:
  web:
    name: web
    driver: bridge
