services:
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    platform: linux/arm64
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Cloudflare Origin CA 인증서 경로 매핑
      - ./certs:/etc/nginx/certs:ro
      - ./html:/usr/share/nginx/html:ro
      - ./logs:/var/log/nginx
    networks:
      - web

# Cloudflare Origin CA를 사용하므로 Certbot 서비스는 더 이상 사용하지 않습니다.

networks:
  web:
    name: web
    driver: bridge
