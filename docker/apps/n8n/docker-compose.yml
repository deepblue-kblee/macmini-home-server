services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    # 포트 매핑 추가: 맥미니 호스트에서 직접 접근(localhost) 허용
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=${TZ:-Asia/Seoul}
      - TZ=${TZ:-Asia/Seoul}
      - N8N_LOG_LEVEL=info
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODES_EXCLUDE=[]
      
      # [필수 추가] 리버스 프록시 환경 설정
      - N8N_HOST=n8n.deepblue.im
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.deepblue.im/
      # n8n 내부 포트 설정 (Nginx의 proxy_pass 포트와 일치해야 함)
      - N8N_PORT=5678
      
    volumes:
      - ./data:/home/node/.n8n
      - ../../shared:/data
    networks:
      - web
    # Apple Silicon 성능 최적화 (필요시)
    # mem_limit: 2g 

networks:
  web:
    external: true
