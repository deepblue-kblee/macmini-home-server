# ==========================================================
# 0. Default Server (정의되지 않은 모든 요청 차단)
# ==========================================================
# 매칭되는 server_name이 없을 때 n8n으로 연결되는 것을 방지합니다.
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/certs/live/deepblue.im/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/deepblue.im/privkey.pem;

    # 정의되지 않은 도메인으로 접속 시 연결을 끊거나 403 에러 반환
    return 444; 
}

# ==========================================================
# 1. 외부망 HTTP → HTTPS 리다이렉트
# ==========================================================
server {
    listen 80;
    server_name deepblue.im *.deepblue.im;
    return 301 https://$host$request_uri;
}

# ==========================================================
# 2. 내부망 전용 (IP 및 로컬 호스트네임 접속)
# ==========================================================
server {
    listen 80;
    server_name localhost 192.168.219.192 deepblue-MacMini.local;

    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

# ==========================================================
# 3. HTTPS - 루트 도메인 (https://deepblue.im)
# ==========================================================
server {
    listen 443 ssl;
    server_name deepblue.im;

    ssl_certificate     /etc/nginx/certs/live/deepblue.im/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/deepblue.im/privkey.pem;

    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
