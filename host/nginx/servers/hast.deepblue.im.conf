server {
    listen 443 ssl;
    http2 on;
    server_name hast.deepblue.im;

    include /Users/deepblue/services/nginx/common/ssl_params.conf;

    # 최종 확정된 $remote_addr 기준으로 접근 제어 (내부망만 허용)
    allow 127.0.0.1;
    allow 192.168.0.0/16;
    allow 100.64.0.0/10;
    allow 172.16.0.0/12;
    deny all;

    location / {
        proxy_pass http://192.168.219.192:8123;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Essential for Home Assistant)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
