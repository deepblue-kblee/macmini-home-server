server {
    listen 443 ssl;
    http2 on;
    server_name adg.deepblue.im;

    include /Users/deepblue/services/nginx/common/ssl_params.conf;

    # 최종 확정된 $remote_addr 기준으로 접근 제어 (내부망만 허용)
    allow 127.0.0.1;
    allow 192.168.0.0/16;
    allow 100.64.0.0/10;
    deny all;

    location / {
        proxy_pass http://127.0.0.1:13080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AdGuard Home 관리 UI를 위한 추가 설정
        proxy_redirect off;
        proxy_buffering off;
    }
}
