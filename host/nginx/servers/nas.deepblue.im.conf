server {
    listen 443 ssl;
    http2 on;
    server_name nas.deepblue.im;

    include /Users/deepblue/services/nginx/common/ssl_params.conf;

    # 네트워크 3대 원칙: 내부인($is_internal=1)이 아니면 차단
    if ($is_internal = 0) {
        return 403;
    }

    location / {
        # 시놀로지 NAS 내부 IP 및 기본 DSM HTTPS 포트(5001) 연결
        # 만약 NAS에서 HTTP(5000)를 사용 중이라면 http://192.168.219.191:5000 으로 수정 가능
        proxy_pass https://192.168.219.191:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 시놀로지 앱 및 웹 인터페이스를 위한 설정
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        proxy_redirect off;
    }
}
